<!DOCTYPE html>
<html>
<head>
  <title>Bioluminescence Quiz</title>
  <link rel="stylesheet" type="text/css" href="quizStyle.css">
</head>
<body>
  <h1>Bioluminescence Quiz</h1>
  <div id="quiz-container">
    <h2 id="question"></h2>
    <ul id="options">
      <li><input type="radio" name="answer" value="1">Option 1</li>
      <li><input type="radio" name="answer" value="2">Option 2</li>
      <li><input type="radio" name="answer" value="3">Option 3</li>
      <li><input type="radio" name="answer" value="4">Option 4</li>
    </ul>
    <button id="submit-btn" onclick="checkAnswer()">Submit</button>
    <button id="next" onclick="next()">Next</button>
  </div>
  <div id="result"></div>

  <script src="quizScript.js"></script>
</body>
</html>
